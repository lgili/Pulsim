name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      run_benchmarks:
        description: 'Run benchmark tests'
        required: false
        default: false
        type: boolean

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  # =============================================================================
  # C++ Build and Test with Multiple Compilers
  # =============================================================================
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux with Clang 17 (primary - recommended for C++23)
          - name: "Linux Clang 17"
            os: ubuntu-24.04
            compiler: clang
            cc: clang-17
            cxx: clang++-17
            build_type: Release
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev

          # Linux with Clang 18 (latest)
          - name: "Linux Clang 18"
            os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Release
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build clang-18 libc++-18-dev libc++abi-18-dev libsuitesparse-dev libeigen3-dev

          # Linux with GCC 13 (fallback)
          - name: "Linux GCC 13"
            os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            build_type: Release
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build gcc-13 g++-13 libsuitesparse-dev libeigen3-dev

          # macOS ARM64 (Apple Silicon)
          # Note: macos-13 (Intel) removed - Apple has transitioned to ARM,
          # and Intel runners frequently timeout in GitHub Actions queue
          - name: "macOS ARM64 (Apple Silicon)"
            os: macos-14
            compiler: appleclang
            cc: clang
            cxx: clang++
            build_type: Release
            install_cmd: brew install cmake ninja suite-sparse eigen

          # Linux Debug build with sanitizers
          - name: "Linux Debug + Sanitizers"
            os: ubuntu-24.04
            compiler: clang
            cc: clang-17
            cxx: clang++-17
            build_type: Debug
            sanitizers: ON
            build_parallel_level: 2
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DPULSIM_BUILD_TESTS=ON \
            -DPULSIM_SANITIZERS=${{ matrix.sanitizers || 'OFF' }}

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build_type }} \
            --parallel ${{ matrix.build_parallel_level || env.CMAKE_BUILD_PARALLEL_LEVEL }}

      - name: Run C++ Tests
        run: |
          cd build
          # Use longer timeout for sanitizer builds (10-20x overhead)
          if [ "${{ matrix.sanitizers }}" = "ON" ]; then
            # libc++ on Linux can report alloc/dealloc mismatch false positives
            # for certain std::exception message paths under ASan.
            export ASAN_OPTIONS="alloc_dealloc_mismatch=0"
            ctest --output-on-failure --timeout 600
          else
            ctest --output-on-failure --timeout 120
          fi

      - name: Run v2 API Tests
        run: |
          if [ -x "build/core/pulsim_tests" ]; then
            build/core/pulsim_tests "[v2]" --reporter console || true
          else
            echo "Test binary not found, skipping v2 tests"
          fi

  # =============================================================================
  # SUNDIALS Backend Validation (optional dependency enabled)
  # =============================================================================
  sundials-backend:
    name: Linux SUNDIALS backend
    runs-on: ubuntu-24.04
    if: false  # Temporarily disabled: SUNDIALS backend is not in active use
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev

      - name: Configure CMake (SUNDIALS ON)
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -B build-sundials \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DPULSIM_BUILD_TESTS=ON \
            -DPULSIM_BUILD_PYTHON=OFF \
            -DPULSIM_USE_HYPRE=OFF \
            -DPULSIM_USE_SUNDIALS=ON \
            -DPULSIM_ENABLE_LTO=OFF

      - name: Build SUNDIALS backend tests
        run: cmake --build build-sundials --target pulsim_simulation_tests --config Release

      - name: Run backend tests
        run: |
          build-sundials/core/pulsim_simulation_tests "[v1][backend]" --reporter console

  # =============================================================================
  # Python Tests
  # =============================================================================
  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Keep a fast matrix but cover the two most-used user platforms.
        os: [ubuntu-24.04, macos-14, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev gcc-13 g++-13

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja suite-sparse eigen

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install cmake ninja

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest numpy scipy

      - name: Build and install package
        env:
          # On macOS, let CMake auto-detect AppleClang for ABI compatibility.
          # On Linux python jobs, use GCC 13 to avoid libstdc++14 regressions
          # seen in some third-party template instantiations.
          CC: ${{ runner.os == 'Linux' && 'gcc-13' || '' }}
          CXX: ${{ runner.os == 'Linux' && 'g++-13' || '' }}
          # Linux runners can OOM while compiling C++ extension dependencies
          # (yaml-cpp/Catch2) at high parallelism; keep this job stable.
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ runner.os == 'Linux' && '2' || '4' }}
        run: |
          # Use non-editable install in CI to avoid import-time rebuilds with
          # transient pip build-env paths (Windows runner instability).
          pip install ".[dev]"

      - name: Run Python tests
        run: |
          pytest python/tests -v --ignore=python/tests/validation

  # =============================================================================
  # C-Block Focused Tests (compiler path + runtime ABI smoke)
  # =============================================================================
  test_cblock:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-13 g++-13 clang-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja suite-sparse eigen

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest numpy scipy

      - name: Build and install package
        env:
          CC: ${{ runner.os == 'Linux' && 'gcc-13' || '' }}
          CXX: ${{ runner.os == 'Linux' && 'g++-13' || '' }}
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ runner.os == 'Linux' && '2' || '4' }}
        run: |
          pip install ".[dev]"

      - name: Run C-Block tests
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export PULSIM_CC="$(which gcc-13 || which gcc)"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            export PULSIM_CC="$(which clang)"
          fi
          echo "Using PULSIM_CC=${PULSIM_CC:-unset}"
          pytest python/tests/test_cblock.py -v

  # =============================================================================
  # Code Quality
  # =============================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install ruff

      - name: Run ruff
        run: |
          ruff check python/

      - name: Run ruff format check (C-Block paths)
        run: |
          ruff format --check \
            python/pulsim/cblock.py \
            python/pulsim/signal_evaluator.py \
            python/tests/test_cblock.py \
            python/tests/test_signal_evaluator.py \
            python/tests/test_netlist_parser.py

      - name: Check v1 layer boundaries
        run: |
          python3 scripts/check_v1_layer_boundaries.py \
            --map core/v1_layer_map.json \
            --strict

  # =============================================================================
  # Static Analysis (clang-tidy) for v1 core modules
  # =============================================================================
  static-analysis:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-17 clang-tidy-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev

      - name: Configure CMake
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -B build-tidy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DPULSIM_BUILD_TESTS=OFF \
            -DPULSIM_BUILD_PYTHON=OFF \
            -DPULSIM_ENABLE_LTO=OFF

      - name: Build core target for compilation database validity
        run: cmake --build build-tidy --target pulsim --config Debug -j2

      - name: Run clang-tidy (clang-analyzer checks)
        run: |
          clang-tidy-17 -p build-tidy -checks='-*,clang-analyzer-*' \
            core/src/v1/simulation.cpp \
            core/src/v1/simulation_step.cpp \
            core/src/v1/simulation_periodic.cpp \
            core/src/v1/transient_services.cpp

  # =============================================================================
  # Benchmark KPI Gate (PR/push gate + optional manual trigger)
  # =============================================================================
  benchmark:
    if: github.event_name != 'workflow_dispatch' || inputs.run_benchmarks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-17 libc++-17-dev libc++abi-17-dev libsuitesparse-dev libeigen3-dev gcc-13 g++-13

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy scipy pytest

      - name: Build and install Python runtime
        env:
          # Keep benchmark build on GCC 13 for stability with Linux stdlib headers.
          CC: gcc-13
          CXX: g++-13
          # Benchmark job compiles the Python extension as part of pip install.
          # Keep parallelism conservative to avoid intermittent OOM failures.
          CMAKE_BUILD_PARALLEL_LEVEL: 2
        run: |
          pip install ".[dev]"

      - name: Run benchmark suite
        run: |
          python3 benchmarks/benchmark_runner.py \
            --output-dir benchmarks/out_ci

      - name: Run stress suite
        run: |
          python3 benchmarks/stress_suite.py \
            --output-dir benchmarks/stress_out_ci

      - name: Enforce KPI regression gate
        run: |
          python3 benchmarks/kpi_gate.py \
            --baseline benchmarks/kpi_baselines/modular_runtime_phase13_2026-03-07/kpi_baseline.json \
            --thresholds benchmarks/kpi_thresholds.yaml \
            --bench-results benchmarks/out_ci/results.json \
            --stress-summary benchmarks/stress_out_ci/stress_summary.json \
            --report-out benchmarks/out_ci/kpi_gate_report.json \
            --print-report

      - name: Enforce convergence-platform KPI regression gate
        run: |
          python3 benchmarks/kpi_gate.py \
            --baseline benchmarks/kpi_baselines/modular_runtime_phase13_2026-03-07/kpi_baseline.json \
            --thresholds benchmarks/kpi_thresholds_convergence_platform.yaml \
            --bench-results benchmarks/out_ci/results.json \
            --class-matrix benchmarks/convergence_class_matrix.yaml \
            --report-out benchmarks/out_ci/kpi_gate_convergence_platform_report.json \
            --print-report

      - name: Enforce magnetic-core KPI regression gate
        run: |
          python3 benchmarks/kpi_gate.py \
            --baseline benchmarks/kpi_baselines/magnetic_core_phase15_2026-03-09/kpi_baseline.json \
            --thresholds benchmarks/kpi_thresholds_magnetic_core.yaml \
            --bench-results benchmarks/out_ci/results.json \
            --report-out benchmarks/out_ci/kpi_gate_magnetic_core_report.json \
            --print-report

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-kpi-artifacts
          path: |
            benchmarks/out_ci
            benchmarks/stress_out_ci
