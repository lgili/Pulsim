  - { H:  -200, B: -0.32 }
  - { H:     0, B:  0.00 }
  - { H:   200, B:  0.32 }
  - { H:  1400, B:  0.41 }
steinmetz:
  k:     1.45e-3
  alpha: 1.6
  beta:  2.75
