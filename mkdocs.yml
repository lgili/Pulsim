site_name: PulsimCore
site_description: High-performance backend for power electronics simulation (Python-first + YAML netlists)
site_url: https://lgili.github.io/Pulsim/
repo_url: https://github.com/lgili/Pulsim
repo_name: lgili/Pulsim
edit_uri: edit/main/docs/

exclude_docs: |
  Doxyfile
  __pycache__/
  python/
  refactor-python-only-v1-hardening/
  cpp-v1-layer-map.md
  solver-refactor-phase0-baseline.md
  solver-refactor-phase11-electrothermal-gate.md
  convergence-algorithms.md
  determinism.md
  performance-tuning.md
  mainpage.md

theme:
  name: material
  language: en
  logo: assets/images/pulsim-logo.svg
  favicon: assets/images/pulsim-logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep orange
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: deep orange
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mike:
      version_selector: true
      canonical_version: latest
      alias_type: redirect
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            inherited_members: false
            filters:
              - "!^_"
            find_stubs_package: true
            allow_inspection: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lgili/Pulsim
  generator: false

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Overview:
      - Documentation Home: index.md
      - Backend Architecture: backend-architecture.md
      - Getting Started: getting-started.md
      - User Guide: user-guide.md
  - Reference:
      - Components Reference: components-reference.md
      - Control Blocks Reference: control-blocks-reference.md
      - KPI Reference: kpi-reference.md
      - Netlist YAML Format: netlist-format.md
      - Device Models: device-models.md
      - API Reference: api-reference.md
      - Python API (Legacy Notes): python-api.md
  - Guides:
      - Examples and Results: examples-and-results.md
      - Notebooks: notebooks.md
      - AC Analysis: ac-analysis.md
      - Frequency Response Analysis (FRA): fra.md
      - Electrothermal Workflow: electrothermal-workflow.md
      - Parameter Sweep: parameter-sweep.md
      - Real-Time Code Generation: code-generation.md
      - FMI Export: fmi-export.md
      - Automatic Differentiation: automatic-differentiation.md
      - Convergence Tuning: convergence-tuning-guide.md
      - Linear-Solver Cache: linear-solver-cache.md
      - Robustness Policy: robustness-policy.md
      - Troubleshooting: troubleshooting.md
  - Domain Libraries:
      - Magnetic Models: magnetic-models.md
      - Motor Models: motor-models.md
      - Three-Phase Grid Library: three-phase-grid.md
      - Catalog Devices: catalog-devices.md
      - Converter Templates: converter-templates.md
  - Quality Gates:
      - Benchmarks and Parity: benchmarks-and-parity.md
      - SPICE Parity Dashboard: spice-parity-dashboard.md
      - Property-Based Testing: property-based-testing.md
      - Build System: build-system.md
  - Compatibility:
      - GUI Backend Parity: gui-component-parity.md
      - Migration Guide: migration-guide.md
  - Operations:
      - Configuration: configuration.md
      - Docs Versioning and Release: versioning-and-release.md
