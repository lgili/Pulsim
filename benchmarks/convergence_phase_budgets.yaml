schema: pulsim-convergence-phase-budgets-v1
version: 1
phases:
  gate_a:
    description: Observation-only rollout budget (schema coverage + no major runtime regressions).
    metrics:
      typed_convergence_schema_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: true
      convergence_success_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: true
      runtime_p95:
        direction: lower_is_better
        max_regression_rel: 0.10
        required: false

  gate_b:
    description: Passive policy validation budget (dry-run match quality without cross-class regression).
    metrics:
      convergence_policy_match_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false
      convergence_policy_mismatch_rate:
        direction: lower_is_better
        max_regression_abs: 0.02
        required: false
      anti_overfit_violation_rate:
        direction: lower_is_better
        max_regression_abs: 0.01
        required: false
      anti_overfit_budget_exceeded_rate:
        direction: lower_is_better
        max_regression_abs: 0.0
        required: false
      classified_fallback_events_p95:
        direction: lower_is_better
        max_regression_rel: 0.10
        required: false
      class_diode_heavy_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: false
      class_switch_heavy_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: false
      class_zero_cross_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: false
      class_magnetic_nonlinear_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: false
      class_closed_loop_control_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: false
      class_diode_heavy_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false
      class_switch_heavy_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false
      class_zero_cross_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false
      class_magnetic_nonlinear_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false
      class_closed_loop_control_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false
      policy_target_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true
      policy_target_match_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: false
      policy_target_mismatch_rate:
        direction: lower_is_better
        max_regression_abs: 0.0
        required: true
      policy_stable_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true
      policy_stable_mismatch_rate:
        direction: lower_is_better
        max_regression_abs: 0.0
        required: true
      policy_stable_anti_overfit_violation_rate:
        direction: lower_is_better
        max_regression_abs: 0.0
        required: true

  gate_c:
    description: Active balanced policy budget (robustness gains with bounded p95 impact).
    metrics:
      convergence_success_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: true
      runtime_p95:
        direction: lower_is_better
        max_regression_rel: 0.12
        required: true
      class_switch_heavy_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: true
      class_zero_cross_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: true

  gate_d:
    description: Solver/model hardening budget with closed-loop no-regression focus.
    metrics:
      convergence_success_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: true
      class_closed_loop_control_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true
      class_closed_loop_control_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true
      class_magnetic_nonlinear_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.02
        required: false

  gate_e:
    description: Closed-loop control and multirate contract stability budget.
    metrics:
      class_closed_loop_control_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true
      class_closed_loop_control_pass_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true
      class_closed_loop_control_typed_schema_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.0
        required: true

  gate_f:
    description: Tooling/API compatibility budget for typed schema adoption.
    metrics:
      typed_convergence_schema_coverage_rate:
        direction: higher_is_better
        max_regression_abs: 0.01
        required: true
