benchmarks:
  - path: circuits/diode_rectifier.yaml
    scenarios: [direct_trap_heavy]
  - path: circuits/boost_switching_complex.yaml
    scenarios: [direct_trap_heavy_switch, trbdf2_heavy_switch]
  - path: circuits/interleaved_buck_3ph.yaml
    scenarios: [direct_trap_heavy_switch, trbdf2_heavy_switch]
  - path: circuits/buck_mosfet_nonlinear.yaml
    scenarios: [trbdf2_heavy_switch]
  - path: circuits/stiff_rlc.yaml
    scenarios: [trbdf2_heavy_stiff, rosenbrockw_heavy_stiff]
  - path: circuits/periodic_rc_pwm.yaml
    scenarios: [shooting_heavy, harmonic_balance_heavy]
  - path: circuits/magnetic_core_saturation_fixture.yaml
    scenarios: [direct_trap_heavy_magnetic]
  - path: circuits/magnetic_core_hysteresis_fixture.yaml
    scenarios: [direct_trap_heavy_magnetic]

scenarios:
  direct_trap_heavy:
    simulation:
      integrator: trapezoidal
      solver:
        order: [klu]
      tstop: 8e-3

  direct_trap_heavy_switch:
    simulation:
      integrator: trapezoidal
      solver:
        order: [klu]
      tstop: 2.5e-3

  trbdf2_heavy_switch:
    simulation:
      integrator: trbdf2
      solver:
        order: [klu]
      tstop: 2.5e-3

  trbdf2_heavy_stiff:
    simulation:
      integrator: trbdf2
      solver:
        order: [klu]
      tstop: 250e-6

  rosenbrockw_heavy_stiff:
    simulation:
      integrator: rosenbrockw
      solver:
        order: [klu]
      tstop: 250e-6

  shooting_heavy:
    simulation:
      tstop: 500e-6
      shooting:
        period: 20e-6
        max_iterations: 80
        tolerance: 1e-7
        relaxation: 0.5
        store_last_transient: true

  harmonic_balance_heavy:
    simulation:
      harmonic_balance:
        period: 20e-6
        num_samples: 256
        max_iterations: 80
        tolerance: 1e-7
        relaxation: 0.5
        initialize_from_transient: true

  direct_trap_heavy_magnetic:
    simulation:
      integrator: trapezoidal
      solver:
        order: [klu]
      tstop: 6e-3
