schema: pulsim-v1
version: 1
benchmark:
  id: buck_pmos
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Same threshold structure as buck_mosfet_nonlinear; the
      # is_nmos=false path through MOSFET.stamp_jacobian_behavioral
      # has the same Shichman-Hodges formulas with sign-folded vgs/vds.
      max_error: 4e-1
      steady_state_max_error: 4e-1
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/buck_pmos.csv
simulation:
  tstart: 0.0
  tstop: 500e-6
  dt: 0.2e-6
  dt_max: 0.8e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  uic: true
  max_step_retries: 8
  newton:
    max_iterations: 260
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  - type: voltage_source
    name: Vdc
    nodes: [vin, 0]
    waveform:
      type: dc
      value: 24.0
  # PMOS high-side: gate is driven LOW to turn ON (for vgs negative).
  # Vgate idles at v_high=24V (off) and pulses to v_low=0V (on, vgs=-24V).
  - type: voltage_source
    name: Vgate
    nodes: [gate, 0]
    waveform:
      type: pwm
      v_high: 24.0
      v_low: 0.0
      frequency: 80000
      duty: 0.64        # PMOS on when gate=v_low (= idle low fraction).
                        # 0.64 here means 64% off-time, 36% on-time —
                        # equivalent to NMOS duty=0.36 on the same buck.
      dead_time: 80e-9
  - type: pmos
    name: M1
    nodes: [gate, sw, vin]   # gate, drain (= sw, low side), source (= vin,
                             # high side). For PMOS the source connects to
                             # the higher-potential rail; Pulsim's MOSFET
                             # node order is always [gate, drain, source].
    vth: 3.0                  # |Vth| = 3 V — Pulsim's PMOS path takes the
                              # absolute value internally via is_nmos=false.
    kp: 0.20
    lambda: 0.01
    g_off: 1e-8
  - type: diode
    name: D1
    nodes: [0, sw]
    g_on: 150.0
    g_off: 1e-6
  - type: resistor
    name: Rdcr
    nodes: [sw, n_l]
    value: 20m
  - type: inductor
    name: L1
    nodes: [n_l, out]
    value: 220u
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 220u
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 8.0
  - type: resistor
    name: Rbleed_sw
    nodes: [sw, 0]
    value: 1e6
