schema: pulsim-v1
version: 1
benchmark:
  id: synchronous_buck
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Synchronous buck: high-side + low-side switches (no body
      # diode needed because the LOW-side switch IS the freewheel).
      # 24V → 12V (50% duty) at 50 kHz PWM. Output LC filter
      # (47µH/100µF) + 5Ω load. The LOW-side switch carries the
      # inductor current during the OFF half of the cycle.
      max_error: 8.0e-1
      steady_state_max_error: 4.0e-1
simulation:
  tstart: 0.0
  tstop: 500e-6
  dt: 0.2e-6
  integrator: trapezoidal
  adaptive_timestep: false
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: voltage_source
    name: VgateH
    nodes: [gate_h, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.5
  - type: voltage_source
    name: VgateL
    nodes: [gate_l, 0]
    waveform:
      type: pwm
      v_high: 0.0
      v_low: 10.0
      frequency: 50000
      duty: 0.5
  - type: vcswitch
    name: SH
    nodes: [gate_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [gate_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 47e-6
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
