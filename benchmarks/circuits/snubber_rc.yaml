schema: pulsim-v1
version: 1
benchmark:
  id: snubber_rc
  category: linear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # RC snubber across a pulse-driven load: validates that
      # `add_snubber_rc` stamps a series R-C correctly. The pulse
      # rising edge excites the snubber's transient; steady-state
      # the snubber draws zero current (cap is fully charged).
      max_error: 1e-1
      steady_state_max_error: 2e-2
simulation:
  tstart: 0.0
  tstop: 1e-3
  dt: 1e-6
  integrator: trapezoidal
  adaptive_timestep: false
  uic: true
components:
  - type: voltage_source
    name: Vstep
    nodes: [in, 0]
    waveform:
      type: pulse
      v_initial: 0.0
      v_pulse: 10.0
      t_delay: 1e-4
      t_rise: 1e-7
      t_fall: 1e-7
      t_width: 1e-3
      period: 1.0
  - type: resistor
    name: Rload
    nodes: [in, out]
    value: 1000
  - type: snubber_rc
    name: SNUB1
    nodes: [out, 0]
    resistance: 10.0
    capacitance: 1e-6
    ic: 0.0
