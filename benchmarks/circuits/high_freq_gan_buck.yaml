schema: pulsim-v1
version: 1
benchmark:
  id: high_freq_gan_buck
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/high_freq_gan_buck.csv
  # 1 MHz GaN-like buck — 10× the switching frequency of a
  # typical SiC bench, with proportionally scaled LC filter. dt
  # = 10 ns to resolve the transitions. Tests that the timestep
  # machinery handles the cadence and the per-step solve doesn't
  # degrade at this scale.
  kpi:
    - metric: ripple_pkpk
      observable: V(out)
      steady_state_fraction: 0.3
      label: vout
simulation:
  tstart: 0.0
  tstop: 200e-6
  dt: 10e-9
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform: {type: dc, value: 24.0}
  - type: voltage_source
    name: VgateH
    nodes: [gate_h, 0]
    waveform: {type: pwm, v_high: 10.0, v_low: 0.0, frequency: 1000000, duty: 0.5}
  - type: voltage_source
    name: VgateL
    nodes: [gate_l, 0]
    waveform: {type: pwm, v_high: 0.0, v_low: 10.0, frequency: 1000000, duty: 0.5}
  - type: vcswitch
    name: SH
    nodes: [gate_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [gate_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 1.0e-6
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 1.0e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
