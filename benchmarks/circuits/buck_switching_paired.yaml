schema: pulsim-v1
version: 1
benchmark:
  id: buck_switching_paired
  category: switching
  averaged_pair:
    id: buck_mvp_pair
    role: switching
  validation:
    type: none
simulation:
  tstart: 0.0
  tstop: 350e-6
  dt: 0.2e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: true
components:
  - type: voltage_source
    name: Vsw
    nodes: [sw, 0]
    waveform:
      type: pwm
      v_high: 24.0
      v_low: 0.0
      frequency: 50000
      duty: 0.4
      dead_time: 0.0
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 47u
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100u
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10
