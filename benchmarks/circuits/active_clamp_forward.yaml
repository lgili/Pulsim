schema: pulsim-v1
version: 1
benchmark:
  id: active_clamp_forward
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 1.0e+0
      steady_state_max_error: 5.0e-1
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/active_clamp_forward.csv
simulation:
  tstart: 0.0
  tstop: 1.5e-3
  dt: 0.1e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  uic: true
  max_step_retries: 8
  newton:
    max_iterations: 240
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  # Active-clamp forward converter: main switch + clamp switch +
  # clamp cap reset the transformer flux each cycle. Coupled
  # inductor as the transformer (1:1, K=0.95). Single rectifier
  # diode on secondary into LC filter.
  - type: voltage_source
    name: Vin
    nodes: [vin, 0]
    waveform: {type: dc, value: 24.0}
  - type: voltage_source
    name: Vg_main
    nodes: [g_main, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.4
  - type: voltage_source
    name: Vg_clamp
    nodes: [g_clamp, 0]
    waveform:
      type: pwm
      v_high: 0.0
      v_low: 10.0
      frequency: 50000
      duty: 0.4
  # Primary winding sees Vin during main-switch ON, V_clamp during
  # main-switch OFF (clamp switch closes).
  - type: vcswitch
    name: S_main
    nodes: [g_main, sw_drain, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: S_clamp
    nodes: [g_clamp, vin, n_clamp]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: capacitor
    name: C_clamp
    nodes: [n_clamp, sw_drain]
    value: 22e-9
    ic: 16.0
  - type: coupled_inductor
    name: T1
    nodes: [vin, sw_drain, sec_p, sec_n]
    l1: 100e-6
    l2: 100e-6
    coupling: 0.95
  - type: resistor
    name: R_sec_n
    nodes: [sec_n, 0]
    value: 1e-3
  - type: diode
    name: D_rect
    nodes: [sec_p, n_lo]
    g_on: 200.0
    g_off: 1e-6
  - type: diode
    name: D_fw
    nodes: [0, n_lo]
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: Lo
    nodes: [n_lo, out]
    value: 47e-6
    ic: 0.0
  - type: capacitor
    name: Co
    nodes: [out, 0]
    value: 100e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
