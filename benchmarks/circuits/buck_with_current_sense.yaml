schema: pulsim-v1
version: 1
benchmark:
  id: buck_with_current_sense
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Synchronous buck with a small current-sense resistor in
      # series with the inductor (10 mΩ — typical real-world
      # current-monitoring shunt). Tests the solver against a
      # stiff system where R_sense (10 mΩ) << R_load (5 Ω) and
      # R_sense ≈ 2× the switch on-resistance. The ringing on
      # the sense node is what controllers measure.
      max_error: 6.0e-1
      steady_state_max_error: 3.0e-1
simulation:
  tstart: 0.0
  tstop: 500e-6
  dt: 0.2e-6
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: voltage_source
    name: VgateH
    nodes: [gate_h, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.5
  - type: voltage_source
    name: VgateL
    nodes: [gate_l, 0]
    waveform:
      type: pwm
      v_high: 0.0
      v_low: 10.0
      frequency: 50000
      duty: 0.5
  - type: vcswitch
    name: SH
    nodes: [gate_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [gate_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: L1
    nodes: [sw, n_sense]
    value: 47e-6
    ic: 0.0
  # Current-sense shunt — small enough to not perturb the buck
  # significantly but big enough to give a usable V_sense.
  - type: resistor
    name: R_sense
    nodes: [n_sense, out]
    value: 10e-3
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
