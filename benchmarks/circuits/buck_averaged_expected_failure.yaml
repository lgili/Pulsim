schema: pulsim-v1
version: 1
benchmark:
  id: buck_averaged_expected_failure
  category: averaged
  validation:
    type: none
  expectations:
    expected_failure:
      mode: transient
      diagnostic: AveragedInvalidConfiguration
      message_contains: must reference an inductor
simulation:
  tstart: 0.0
  tstop: 50e-6
  dt: 0.2e-6
  adaptive_timestep: false
  averaged_converter:
    enabled: true
    topology: buck
    envelope_policy: strict
    vin_source: Vdc
    inductor: Rload
    capacitor: C1
    load_resistor: Rload
    output_node: out
    duty: 0.4
    duty_min: 0.0
    duty_max: 0.95
    initial_inductor_current: 0.0
    initial_output_voltage: 0.0
    ccm_current_threshold: 0.0
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100u
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10
