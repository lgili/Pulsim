schema: pulsim-v1
version: 1
benchmark:
  id: diode_rectifier
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # max_error is loose because the PWL-ideal Pulsim diode and the
      # ngspice voltage-controlled-switch emulating it follow different
      # integration paths during the first cycle's cap charge (similar
      # numerical noise to the rectifier-bridge first-cycle in PSIM
      # vs SPICE). The meaningful gate is steady_state_max_error.
      max_error: 6e-1
      steady_state_max_error: 5e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/diode_rectifier.csv
simulation:
  tstop: 2e-3
  dt: 1e-6
  uic: true   # PSIM/ngspice-style: L and C start at zero (or per-component ic:)
components:
  - type: voltage_source
    name: Vac
    nodes: [in, 0]
    waveform:
      type: sine
      amplitude: 10.0
      frequency: 50000
      offset: 0.0
  - type: diode
    name: D1
    nodes: [in, out]
    g_on: 1e3
    g_off: 1e-9
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 100
  - type: capacitor
    name: Cfilter
    nodes: [out, 0]
    value: 10u
    ic: 0.0
