schema: pulsim-v1
version: 1
benchmark:
  id: magnetic_core_frequency_trend_high
  category: magnetic
  magnetic_core_loss_observable: Lsat.core_loss
  magnetic_kpi:
    category: frequency_trend
    trend_group: magnetic_core_frequency_trend
    trend_role: high
  validation:
    type: none
simulation:
  tstart: 0.0
  tstop: 3e-3
  dt: 2e-6
  step_mode: fixed
components:
  - type: voltage_source
    name: Vin
    nodes: [vin, 0]
    waveform:
      type: sine
      amplitude: 5
      frequency: 2e4
      offset: 0
      phase: 0
  - type: resistor
    name: R1
    nodes: [vin, n1]
    value: 10
  - type: saturable_inductor
    name: Lsat
    nodes: [n1, 0]
    inductance: 100n
    saturation_current: 5.0
    saturation_inductance: 80n
    magnetic_core:
      enabled: true
      model: saturation
      core_loss_k: 0.1
      core_loss_alpha: 2.0
      core_loss_freq_coeff: 1e-4
