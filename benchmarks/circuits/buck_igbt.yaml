schema: pulsim-v1
version: 1
benchmark:
  id: buck_igbt
  category: switching
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Phase-6 IGBT smooth-gm fix lets DC OP converge cleanly (V(sw)
      # locks to the analytical 23.988 V on a Vdc + IGBT + Rload bench
      # within 7 Newton iterations). Transient parity vs ngspice has
      # the same LC-ringing-phase residual as buck_mosfet_nonlinear:
      # ζ ≈ 0.06 (severely underdamped), 14 ms settling time vs 350 µs
      # window means the trace is dominated by the underdamped ring
      # and the two simulators end on different ring phases.
      #
      # Additionally the high-side IGBT gate-emitter referenced
      # threshold is realistic but ngspice's SW model uses gate-vs-
      # ground (ngspice has no native IGBT). The two diverge slightly
      # during turn-on/turn-off transitions whenever V(emitter) is
      # changing rapidly. ~3 V max_error reflects both factors.
      max_error: 3.5e+0
      steady_state_max_error: 3e+0
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/buck_igbt.csv
simulation:
  tstart: 0.0
  tstop: 350e-6
  dt: 0.2e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  uic: true   # PSIM/ngspice-style: L and C start at zero (or per-component ic:)
  # Behavioral path now has smooth gm (Phase-6 IGBT fix) so DC OP
  # converges naturally; no special switching_mode override needed.
  max_step_retries: 8
  newton:
    max_iterations: 220
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: voltage_source
    name: Vpwm
    nodes: [ctrl, 0]
    waveform:
      type: pwm
      # 35 V drive: with IGBT in high-side configuration the source
      # (= sw node) rises to ≈ Vcc when conducting, so vge = V_drive
      # − V(sw). Need V_drive > Vcc + Vth (= 29 V) to keep the IGBT
      # securely above threshold across the whole conduction cycle.
      # 15 V drive (common in low-side / single-rail topologies) makes
      # the high-side IGBT marginal: after turn-on V(sw) ≈ Vcc and
      # vge = 15 − 24 = −9 V → below threshold → oscillation.
      v_high: 35.0
      v_low: 0.0
      frequency: 50000
      duty: 0.4
      dead_time: 200e-9
  - type: igbt
    name: Q1
    nodes: [ctrl, vcc, sw]   # gate, collector, emitter
    vth: 5.0
    g_on: 200.0
    g_off: 1e-6
    v_ce_sat: 1.5
  - type: diode
    name: D1
    nodes: [0, sw]
    g_on: 200.0
    g_off: 1e-6
  - type: resistor
    name: Rdcr
    nodes: [sw, n_l]
    value: 20m
  - type: inductor
    name: L1
    nodes: [n_l, out]
    value: 47u
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100u
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10
