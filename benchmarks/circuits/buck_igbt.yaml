schema: pulsim-v1
version: 1
benchmark:
  id: buck_igbt
  category: switching
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Pulsim's IGBT (vth, g_on, g_off, v_ce_sat) is a simple voltage-
      # controlled conductance — no Vce_sat drop in the AD path, just
      # the linear g*Vce relationship. ngspice has no native IGBT, so
      # we emulate with a voltage-controlled SW model with matching
      # RON / ROFF / VT. Identical to buck_switching's threshold
      # structure modulo the g_on conductance level.
      max_error: 1.5e-1
      steady_state_max_error: 1e-1
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/buck_igbt.csv
simulation:
  tstart: 0.0
  tstop: 350e-6
  dt: 0.2e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: true   # IGBT needs event-driven commutation for the
                        # Ideal PWL path to flip pwl_state on PWM edges
  uic: true   # PSIM/ngspice-style: L and C start at zero (or per-component ic:)
  switching_mode: ideal   # IGBT behavioral path has no gm in the Jacobian
                          # (hard switch on Vge>Vth) — Newton can't find DC OP.
                          # Ideal PWL path uses event-driven commutation.
  max_step_retries: 8
  newton:
    max_iterations: 220
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: voltage_source
    name: Vpwm
    nodes: [ctrl, 0]
    waveform:
      type: pwm
      v_high: 15.0       # IGBT gate-emitter drive (typically 12-18 V)
      v_low: 0.0
      frequency: 50000
      duty: 0.4
      dead_time: 200e-9
  - type: igbt
    name: Q1
    nodes: [ctrl, vcc, sw]   # gate, collector, emitter
    vth: 5.0
    g_on: 200.0
    g_off: 1e-6
    v_ce_sat: 1.5
  - type: diode
    name: D1
    nodes: [0, sw]
    g_on: 200.0
    g_off: 1e-6
  - type: resistor
    name: Rdcr
    nodes: [sw, n_l]
    value: 20m
  - type: inductor
    name: L1
    nodes: [n_l, out]
    value: 47u
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100u
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10
