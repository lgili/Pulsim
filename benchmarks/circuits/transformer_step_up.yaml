schema: pulsim-v1
version: 1
benchmark:
  id: transformer_step_up
  category: linear
  observables:
    - column: V(sec)
  expectations:
    metrics:
      max_error: 1e-1
      steady_state_max_error: 5e-2
  validation:
    type: reference
    observable: V(sec)
    baseline: baselines/transformer_step_up.csv
simulation:
  tstop: 2e-3
  dt: 1e-6
  uic: true
components:
  - type: voltage_source
    name: Vac
    nodes: [pri, 0]
    waveform:
      type: sine
      amplitude: 10.0
      frequency: 1000
      offset: 0.0
  - type: resistor
    name: Rsrc
    nodes: [pri, pri_x]
    value: 1.0
  - type: transformer
    name: Tx1
    nodes: [pri_x, 0, sec, 0]   # primary [+, -], secondary [+, -]
    turns_ratio: 0.5             # n = N_p/N_s = 0.5 → step-up by 2x
  - type: resistor
    name: Rload
    nodes: [sec, 0]
    value: 1e3
