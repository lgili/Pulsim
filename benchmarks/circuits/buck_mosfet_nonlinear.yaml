schema: pulsim-v1
version: 1
benchmark:
  id: buck_mosfet_nonlinear
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Pulsim's Level-1-style MOSFET (vth/kp/lambda) and ngspice's
      # NMOS LEVEL=1 model agree on the parameters but evaluate the
      # operating-point differently (Vds-conditioned current, body
      # diode handling). The ~0.5 V whole-trace error is the real
      # device-model gap, not a solver bug.
      max_error: 6e-1
      steady_state_max_error: 6e-1
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/buck_mosfet_nonlinear.csv
simulation:
  tstart: 0.0
  tstop: 500e-6
  dt: 0.2e-6
  dt_max: 0.8e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  max_step_retries: 8
  newton:
    max_iterations: 260
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
  uic: true   # PSIM/ngspice-style: L and C start at zero (or per-component ic:)
components:
  - type: voltage_source
    name: Vdc
    nodes: [vin, 0]
    waveform:
      type: dc
      value: 24.0

  - type: voltage_source
    name: Vgate
    nodes: [gate, 0]
    waveform:
      type: pwm
      v_high: 35.0
      v_low: 0.0
      frequency: 80000
      duty: 0.36
      dead_time: 80e-9

  - type: mosfet
    name: M1
    nodes: [gate, vin, sw]
    vth: 3.0
    kp: 0.20
    lambda: 0.01
    g_off: 1e-8

  - type: diode
    name: D1
    nodes: [0, sw]
    g_on: 150.0
    g_off: 1e-6

  - type: resistor
    name: Rdcr
    nodes: [sw, n_l]
    value: 20m
  - type: inductor
    name: L1
    nodes: [n_l, out]
    value: 220u
    ic: 0.0

  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 220u
    ic: 0.0

  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 8.0

  - type: resistor
    name: Rbleed_sw
    nodes: [sw, 0]
    value: 1e6
