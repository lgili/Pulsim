schema: pulsim-v1
version: 1
benchmark:
  id: buck_mosfet_nonlinear
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Phase-5 finding: Pulsim's Level-1 MOSFET (vth/kp/lambda) and
      # ngspice's .model NMOS LEVEL=1 with W=L=1u use identical
      # Shichman-Hodges formulas (verified by DC operating-point match,
      # kp=0.2 → R_DSon ≈ 0.7 Ω at Vov=7 V triode). The 0.31 V whole-
      # trace residual is composite:
      #   - PWM duty interpretation: Pulsim duty=0.36 means high-time
      #     = 0.36*period exactly (dead_time is a transition delay,
      #     not subtracted). ngspice PULSE PW = 4.5 µs, not 4.42 µs.
      #     This alone reduces the error from 0.5 V → 0.31 V.
      #   - LC-filter ringing phase: ζ ≈ 0.06 (severely underdamped),
      #     14 ms settling time vs 500 µs window means both simulators
      #     are still on different phases of the same ring.
      # On this underdamped LC the runner's steady-state detector
      # ends up returning the whole window (ss_err == max_err), so
      # both gates are 4e-1.
      max_error: 4e-1
      steady_state_max_error: 4e-1
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/buck_mosfet_nonlinear.csv
simulation:
  tstart: 0.0
  tstop: 500e-6
  dt: 0.2e-6
  dt_max: 0.8e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  max_step_retries: 8
  newton:
    max_iterations: 260
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
  uic: true   # PSIM/ngspice-style: L and C start at zero (or per-component ic:)
components:
  - type: voltage_source
    name: Vdc
    nodes: [vin, 0]
    waveform:
      type: dc
      value: 24.0

  - type: voltage_source
    name: Vgate
    nodes: [gate, 0]
    waveform:
      type: pwm
      v_high: 35.0
      v_low: 0.0
      frequency: 80000
      duty: 0.36
      dead_time: 80e-9

  - type: mosfet
    name: M1
    nodes: [gate, vin, sw]
    vth: 3.0
    kp: 0.20
    lambda: 0.01
    g_off: 1e-8

  - type: diode
    name: D1
    nodes: [0, sw]
    g_on: 150.0
    g_off: 1e-6

  - type: resistor
    name: Rdcr
    nodes: [sw, n_l]
    value: 20m
  - type: inductor
    name: L1
    nodes: [n_l, out]
    value: 220u
    ic: 0.0

  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 220u
    ic: 0.0

  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 8.0

  - type: resistor
    name: Rbleed_sw
    nodes: [sw, 0]
    value: 1e6
