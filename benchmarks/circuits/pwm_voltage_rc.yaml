schema: pulsim-v1
version: 1
benchmark:
  id: pwm_voltage_rc
  category: linear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # PWM source feeding an RC low-pass filter — validates the
      # PWMVoltageSource component directly (no switching device
      # downstream). The duty=0.4 → average input voltage = 4 V,
      # and the RC tau = 1 ms ≫ PWM period 20 µs, so V_out
      # converges toward the duty-weighted average.
      max_error: 1e-1
      steady_state_max_error: 5e-2
simulation:
  tstart: 0.0
  tstop: 5e-3
  dt: 1e-6
  integrator: trapezoidal
  adaptive_timestep: false
  uic: true
components:
  - type: voltage_source
    name: Vpwm
    nodes: [in, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.4
  - type: resistor
    name: R1
    nodes: [in, out]
    value: 1000
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 1e-6
    ic: 0.0
