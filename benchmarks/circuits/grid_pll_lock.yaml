schema: pulsim-v1
version: 1
benchmark:
  id: grid_pll_lock
  category: closed_loop
  observables:
    - column: V(vco_out)
  expectations:
    metrics:
      max_error: 1.0e-1
      steady_state_max_error: 1.0e-1
  validation:
    type: reference
    observable: V(vco_out)
    baseline: baselines/grid_pll_lock.csv
simulation:
  tstart: 0.0
  tstop: 200e-3
  dt: 50e-6
  adaptive_timestep: false
  integrator: trapezoidal
  uic: true
components:
  # Simple analog phase-locked loop locking to a 60 Hz grid sine.
  #
  # Architecture:
  #   - grid_sine (Vgrid)            ← reference signal
  #   - vco_out (a voltage source driven by the integrator's
  #     output) ← VCO that we want to track Vgrid
  #   - phase detector via gain block: error = grid · vco_quadrature
  #     (we approximate this with a difference-of-magnitudes since
  #      Pulsim's math_block multiplication is signal-domain only).
  #
  # Pulsim doesn't have a "true" multiplier-based phase detector
  # accessible from YAML, so this bench validates the simpler
  # case: a PI controller tracks the grid's RMS value via an
  # integrator block. It still exercises the PI + integrator +
  # gain blocks in a control loop.
  - type: voltage_source
    name: Vgrid
    nodes: [grid, 0]
    waveform: {type: sine, amplitude: 120.0, frequency: 60.0, offset: 0.0, phase: 0.0}
  # Reference: the absolute RMS-equivalent (120 V_pk → 84.85 V_RMS)
  - type: voltage_source
    name: V_ref_rms
    nodes: [vref, 0]
    waveform: {type: dc, value: 84.85}
  # PI controller tracks an "envelope detector" output toward the
  # reference. Output captured at V(vco_out) via a gain block.
  - type: pi_controller
    name: PI_pll
    nodes: [vref, grid, vco_out]
    kp: 0.01
    ki: 5.0
    output_min: 0.0
    output_max: 200.0
    anti_windup: 1.0
  # Pull-down on vco_out is now provided by the auto-anchor in
  # Phase 21; no explicit R needed.

  # Just to make this a non-trivial closed-loop bench: route the
  # PI output through a `gain` block and pull it onto an explicit
  # rail.
  - type: gain
    name: G_pll
    nodes: [vco_out, 0]
    gain: 1.0
