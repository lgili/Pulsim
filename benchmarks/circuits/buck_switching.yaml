schema: pulsim-v1
version: 1
benchmark:
  id: buck_switching
  category: switching
  observables:
    - column: V(out)
  expectations:
    metrics:
      # max_error is 0.5 % of Vin=24V (Pulsim ideal switch vs ngspice
      # SW-model behavior over the first ~17 cycles of switching
      # — pure numerical noise from the switch-model rounding paths).
      # steady_state_max_error catches the meaningful regression.
      max_error: 1.5e-1
      steady_state_max_error: 1e-1
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/buck_switching.csv
simulation:
  tstart: 0.0
  tstop: 350e-6
  dt: 0.2e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  uic: true   # PSIM/ngspice-style: L and C start at zero (or per-component ic:)
  max_step_retries: 8
  newton:
    max_iterations: 220
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: voltage_source
    name: Vpwm
    nodes: [ctrl, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.4
      dead_time: 200e-9
  - type: vcswitch
    name: S1
    nodes: [ctrl, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: diode
    name: D1
    nodes: [0, sw]
    g_on: 200.0
    g_off: 1e-6
  - type: resistor
    name: Rdcr
    nodes: [sw, n_l]
    value: 20m
  - type: inductor
    name: L1
    nodes: [n_l, out]
    value: 47u
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100u
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10
