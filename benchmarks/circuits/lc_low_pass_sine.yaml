schema: pulsim-v1
version: 1
benchmark:
  id: lc_low_pass_sine
  category: linear
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 1.0e-2
      steady_state_max_error: 1.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/lc_low_pass_sine.csv
simulation:
  tstart: 0.0
  tstop: 4e-3
  dt: 1e-6
  adaptive_timestep: false
  integrator: trapezoidal
  uic: true
components:
  # 2nd-order LC low-pass with f_c = 1/(2π√(LC)) ≈ 1.6 kHz.
  # Sweep a 5 kHz sine (3× f_c) — output should be attenuated.
  - type: voltage_source
    name: Vac
    nodes: [ac, 0]
    waveform:
      type: sine
      amplitude: 5.0
      frequency: 5000.0
      offset: 0.0
      phase: 0.0
  - type: inductor
    name: L1
    nodes: [ac, out]
    value: 1.0e-3
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 10.0e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 100.0
