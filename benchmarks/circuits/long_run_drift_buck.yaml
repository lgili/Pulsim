schema: pulsim-v1
version: 1
benchmark:
  id: long_run_drift_buck
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/long_run_drift_buck.csv
  # Long-duration steady-state stability check. The buck is fully
  # settled by t = 5 ms and runs for another 95 ms without drift.
  # KPIs report the linear regression slope (V/s) and the steady-
  # state ripple in the last 20 % of samples.
  kpi:
    - metric: ripple_pkpk
      observable: V(out)
      steady_state_fraction: 0.5
      label: vout_long
simulation:
  tstart: 0.0
  tstop: 100e-3
  dt: 1.0e-6
  dt_max: 2.0e-6
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform: {type: dc, value: 24.0}
  - type: voltage_source
    name: VgateH
    nodes: [gate_h, 0]
    waveform: {type: pwm, v_high: 10.0, v_low: 0.0, frequency: 100000, duty: 0.5}
  - type: voltage_source
    name: VgateL
    nodes: [gate_l, 0]
    waveform: {type: pwm, v_high: 0.0, v_low: 10.0, frequency: 100000, duty: 0.5}
  - type: vcswitch
    name: SH
    nodes: [gate_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [gate_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 47e-6
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
