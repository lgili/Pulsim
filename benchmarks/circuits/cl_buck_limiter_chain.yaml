schema: pulsim-v1
version: 1
benchmark:
  id: cl_buck_limiter_chain
  category: closed_loop
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/cl_buck_limiter_chain.csv
simulation:
  tstart: 0.0
  tstop: 5e-3
  dt: 0.5e-6
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vin
    nodes: [vin, 0]
    waveform: {type: dc, value: 10.0}
  - type: voltage_source
    name: Vref
    nodes: [vref, 0]
    waveform: {type: dc, value: 5.0}
  - type: resistor
    name: R_piout
    nodes: [pi_out, 0]
    value: 1.0e6
  # PI without internal clamping (output_min/max wide) → feeds a
  # `limiter` block that hard-clips to [0.1, 0.9] before reaching
  # the PWM.  Tests the limiter block in isolation from the PI.
  - type: pi_controller
    name: PI
    nodes: [vref, out, pi_out]
    kp: 0.05
    ki: 200.0
    output_min: -10.0
    output_max: 10.0
  - type: limiter
    name: LIM
    nodes: [pi_out, 0]
    min: 0.1
    max: 0.9
  - type: voltage_source
    name: V_pgin
    nodes: [pgin, 0]
    waveform: {type: dc, value: 0.0}
  - type: pwm_generator
    name: PWM
    nodes: [pgin]
    frequency: 100000
    duty_from_channel: LIM
    target_component: SH
  - type: switch
    name: SH
    nodes: [vin, sw]
    initial_closed: 0
    g_on: 100.0
    g_off: 1e-6
  - type: diode
    name: Dfw
    nodes: [0, sw]
    g_on: 100.0
    g_off: 1e-6
  - type: resistor
    name: R_dcr
    nodes: [sw, n_l]
    value: 0.2
  - type: inductor
    name: L1
    nodes: [n_l, n_esr]
    value: 10e-6
    ic: 0.0
  - type: resistor
    name: R_esr
    nodes: [n_esr, out]
    value: 0.05
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10.0
