schema: pulsim-v1
version: 1
benchmark:
  id: sync_buck_500khz
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # 10× the switching frequency of synchronous_buck (50 kHz → 500 kHz).
      # Forces the solver to resolve a ~2 µs period with ~10 sample
      # points/period, i.e. timestep tightly tied to the dominant
      # nonlinear event rate. Same topology, smaller LC filter to keep
      # the output ripple in the same ballpark.
      max_error: 4.0e-1
      steady_state_max_error: 2.0e-1
simulation:
  tstart: 0.0
  tstop: 200e-6
  dt: 40e-9
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform:
      type: dc
      value: 24.0
  - type: voltage_source
    name: VgateH
    nodes: [gate_h, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 500000
      duty: 0.5
  - type: voltage_source
    name: VgateL
    nodes: [gate_l, 0]
    waveform:
      type: pwm
      v_high: 0.0
      v_low: 10.0
      frequency: 500000
      duty: 0.5
  - type: vcswitch
    name: SH
    nodes: [gate_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [gate_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 4.7e-6   # 10× smaller, scales with 1/f
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 10e-6    # 10× smaller, scales with 1/f
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
