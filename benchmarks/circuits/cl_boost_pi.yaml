schema: pulsim-v1
version: 1
benchmark:
  id: cl_boost_pi
  category: closed_loop
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/cl_boost_pi.csv
simulation:
  tstart: 0.0
  tstop: 30e-3
  dt: 0.5e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  switching_mode: ideal
  uic: true
  max_step_retries: 8
  newton:
    max_iterations: 240
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  - type: voltage_source
    name: Vin
    nodes: [vin, 0]
    waveform: {type: dc, value: 5.0}
  - type: voltage_source
    name: Vref
    nodes: [vref, 0]
    waveform: {type: dc, value: 10.0}
  - type: pi_controller
    name: PI
    nodes: [vref, out, pi_out]
    kp: 0.005
    ki: 50.0
    output_min: 0.0
    output_max: 0.9
    anti_windup: 1.0
  - type: voltage_source
    name: V_pgin
    nodes: [pgin, 0]
    waveform: {type: dc, value: 0.0}
  - type: pwm_generator
    name: PWM
    nodes: [pgin]
    frequency: 100000
    duty_from_channel: PI
    target_component: SL
  - type: resistor
    name: R_dcr
    nodes: [vin, n_l]
    value: 0.1
  - type: inductor
    name: L1
    nodes: [n_l, sw]
    value: 47e-6
    ic: 0.0
  - type: switch
    name: SL
    nodes: [sw, 0]
    initial_closed: 1
    g_on: 100.0
    g_off: 1e-6
  - type: diode
    name: Drect
    nodes: [sw, out]
    g_on: 100.0
    g_off: 1e-6
  - type: capacitor
    name: Cout
    nodes: [out, 0]
    value: 470e-6
    ic: 10.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 40.0
