schema: pulsim-v1
version: 1
benchmark:
  id: stiff_rc_high_freq_switching
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/stiff_rc_high_freq_switching.csv
  # Stiff time-scale ratio test: a 1 GΩ leakage RC sits in parallel
  # with the buck output, providing a 1 s discharge time constant
  # while the switching loop runs at 500 kHz (2 µs period). The
  # ratio of slow-to-fast time constants is 5·10⁵ — the kind of
  # stiff system that breaks naive explicit solvers.
simulation:
  tstart: 0.0
  tstop: 500e-6
  dt: 0.1e-6
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform: {type: dc, value: 24.0}
  - type: voltage_source
    name: VgateH
    nodes: [gate_h, 0]
    waveform: {type: pwm, v_high: 10.0, v_low: 0.0, frequency: 500000, duty: 0.5}
  - type: voltage_source
    name: VgateL
    nodes: [gate_l, 0]
    waveform: {type: pwm, v_high: 0.0, v_low: 10.0, frequency: 500000, duty: 0.5}
  - type: vcswitch
    name: SH
    nodes: [gate_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [gate_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 4.7e-6
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 10e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 5.0
  # 1 GΩ leakage path: τ_leak = 1 GΩ · 10 µF = 10 000 s ≫ 2 µs PWM period.
  # The simulator must handle this enormous time-scale spread.
  - type: resistor
    name: R_leak
    nodes: [out, 0]
    value: 1.0e9
