schema: pulsim-v1
version: 1
benchmark:
  id: boost_classic
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      # Classic boost: V_in=12V, single low-side switch, freewheel
      # diode to output cap, 47 µH inductor, 50 kHz PWM. Duty=0.4 →
      # V_out_ideal = V_in / (1 - duty) = 12 / 0.6 = 20 V. The
      # transient max_err catches the first-cycle differences
      # between Pulsim's PWL switch model and ngspice's SW model;
      # steady_state_max_err is the meaningful gate.
      max_error: 1.0e+1
      steady_state_max_error: 5.0e-1
simulation:
  tstart: 0.0
  tstop: 1.5e-3
  dt: 0.2e-6
  dt_max: 1e-6
  adaptive_timestep: false
  integrator: bdf1
  enable_events: false
  uic: true
  max_step_retries: 8
  newton:
    max_iterations: 220
    initial_damping: 0.5
    min_damping: 1e-4
    auto_damping: true
  fallback:
    trace_retries: true
    enable_transient_gmin: true
    gmin_retry_threshold: 1
    gmin_initial: 1e-8
    gmin_max: 1e-4
    gmin_growth: 10
components:
  - type: voltage_source
    name: Vin
    nodes: [vin, 0]
    waveform:
      type: dc
      value: 12.0
  - type: voltage_source
    name: Vgate
    nodes: [gate, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.4
      dead_time: 200e-9
  - type: inductor
    name: L1
    nodes: [vin, sw_node]
    value: 47e-6
    ic: 0.0
  - type: vcswitch
    name: SW
    nodes: [gate, sw_node, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: diode
    name: Drect
    nodes: [sw_node, out]
    g_on: 200.0
    g_off: 1e-6
  - type: capacitor
    name: Cout
    nodes: [out, 0]
    value: 47e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 20.0
