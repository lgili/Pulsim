schema: pulsim-v1
version: 1
benchmark:
  id: coupled_inductor_step
  category: linear
  observables:
    - column: V(sec)
  expectations:
    metrics:
      # Pulse-driven 1:1 coupled inductor with K=0.99 and resistive
      # load on the secondary. Validates the SPICE-style mutual
      # stamping (`V_i = L_i·dI_i/dt + Σ M_ij·dI_j/dt`) where the
      # mutual term M = K·√(L1·L2) is added to each branch equation
      # via `stamp_coupled_inductor_terms`. Pulsim's V(sec)/V(prim)
      # transfer ratio should track ngspice's K1 statement to within
      # the integrator's discretization error.
      max_error: 1e-1
      steady_state_max_error: 5e-2
simulation:
  tstart: 0.0
  tstop: 1e-3
  dt: 1e-6
  integrator: trapezoidal
  adaptive_timestep: false
components:
  - type: voltage_source
    name: Vsrc
    nodes: [vin, 0]
    waveform:
      type: pulse
      v_initial: 0.0
      v_pulse: 5.0
      t_delay: 100e-6
      t_rise: 10e-6   # > dt = 1us; resolves the step properly
      t_fall: 10e-6
      t_width: 1e-3
      period: 1.0
  - type: resistor
    name: Rser
    nodes: [vin, prim]
    value: 0.5
  - type: coupled_inductor
    name: T1
    nodes: [prim, 0, sec, 0]
    l1: 100e-6
    l2: 100e-6
    coupling: 0.99
  - type: resistor
    name: Rload
    nodes: [sec, 0]
    value: 10.0
