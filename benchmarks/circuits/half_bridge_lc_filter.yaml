schema: pulsim-v1
version: 1
benchmark:
  id: half_bridge_lc_filter
  category: nonlinear
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/half_bridge_lc_filter.csv
simulation:
  tstart: 0.0
  tstop: 600e-6
  dt: 0.2e-6
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  # Half-bridge driven by complementary PWM voltage sources at 50%
  # duty. Output LC filter recovers a clean DC (= V_in/2 = 12 V).
  - type: voltage_source
    name: Vdc
    nodes: [vcc, 0]
    waveform: {type: dc, value: 24.0}
  - type: voltage_source
    name: VgH
    nodes: [g_h, 0]
    waveform:
      type: pwm
      v_high: 10.0
      v_low: 0.0
      frequency: 50000
      duty: 0.5
  - type: voltage_source
    name: VgL
    nodes: [g_l, 0]
    waveform:
      type: pwm
      v_high: 0.0
      v_low: 10.0
      frequency: 50000
      duty: 0.5
  - type: vcswitch
    name: SH
    nodes: [g_h, vcc, sw]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  - type: vcswitch
    name: SL
    nodes: [g_l, sw, 0]
    v_threshold: 5.0
    g_on: 200.0
    g_off: 1e-6
  # LC output filter
  - type: inductor
    name: L1
    nodes: [sw, out]
    value: 100e-6
    ic: 0.0
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 47e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10.0
