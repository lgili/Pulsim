schema: pulsim-v1
version: 1
benchmark:
  id: ac_rc_lowpass
  validation:
    type: ac_analytical
    model: rc_lowpass
    params:
      r: 1k
      c: 1u
  expectations:
    metrics:
      max_error: 1e-4
      phase_error_deg: 1e-3
simulation:
  tstart: 0.0
  tstop: 1e-3
  dt: 1e-6
  frequency_analysis:
    enabled: true
    mode: open_loop_transfer
    anchor: dc
    sweep:
      scale: log
      f_start_hz: 10.0
      f_stop_hz: 100000.0
      points: 80
    injection_current_amplitude: 1.0
    perturbation:
      positive: in
      negative: 0
    output:
      positive: out
      negative: 0
components:
  - type: resistor
    name: R1
    nodes: [in, out]
    value: 1k
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 1u
    ic: 0.0
