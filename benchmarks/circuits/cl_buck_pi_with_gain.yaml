schema: pulsim-v1
version: 1
benchmark:
  id: cl_buck_pi_with_gain
  category: closed_loop
  observables:
    - column: V(out)
  expectations:
    metrics:
      max_error: 5.0e-2
      steady_state_max_error: 5.0e-2
  validation:
    type: reference
    observable: V(out)
    baseline: baselines/cl_buck_pi_with_gain.csv
simulation:
  tstart: 0.0
  tstop: 5e-3
  dt: 0.5e-6
  adaptive_timestep: false
  integrator: trapezoidal
  switching_mode: ideal
  uic: true
components:
  - type: voltage_source
    name: Vin
    nodes: [vin, 0]
    waveform: {type: dc, value: 10.0}
  # Scaled reference: 2.5 V representing half of 5 V.  Then a gain
  # block scales V(out) by 0.5 before feeding to the PI (emulating
  # a voltage divider on the output for sense scaling).
  - type: voltage_source
    name: Vref
    nodes: [vref, 0]
    waveform: {type: dc, value: 2.5}
  - type: resistor
    name: R_gainout
    nodes: [out_scaled, 0]
    value: 1.0e6
  # Gain block: out_scaled = 0.5 * V(out)
  - type: gain
    name: G_fb
    nodes: [out, out_scaled]
    gain: 0.5
  - type: resistor
    name: R_piout
    nodes: [pi_out, 0]
    value: 1.0e6
  # PI compares vref (=2.5) against the gain block's output (=out·0.5).
  # In steady state out=5 → out_scaled=2.5 → error=0 → output stable.
  # NOTE: the gain block's electrical output is V(out_scaled) which
  # is pulled down by R_gainout (1 MΩ) — the actual PI input is the
  # node voltage. We use V(out) as the second input directly since
  # the gain channel doesn't drive node voltages.
  - type: pi_controller
    name: PI
    nodes: [vref, out, pi_out]
    kp: 0.05
    ki: 200.0
    output_min: 0.0
    output_max: 1.0
    anti_windup: 1.0
    gain: 0.5    # internal scaling: PI computes (vref - 0.5*out)
  - type: voltage_source
    name: V_pgin
    nodes: [pgin, 0]
    waveform: {type: dc, value: 0.0}
  - type: pwm_generator
    name: PWM
    nodes: [pgin]
    frequency: 100000
    duty_from_channel: PI
    target_component: SH
  - type: switch
    name: SH
    nodes: [vin, sw]
    initial_closed: 0
    g_on: 100.0
    g_off: 1e-6
  - type: diode
    name: Dfw
    nodes: [0, sw]
    g_on: 100.0
    g_off: 1e-6
  - type: resistor
    name: R_dcr
    nodes: [sw, n_l]
    value: 0.2
  - type: inductor
    name: L1
    nodes: [n_l, n_esr]
    value: 10e-6
    ic: 0.0
  - type: resistor
    name: R_esr
    nodes: [n_esr, out]
    value: 0.05
  - type: capacitor
    name: C1
    nodes: [out, 0]
    value: 100e-6
    ic: 0.0
  - type: resistor
    name: Rload
    nodes: [out, 0]
    value: 10.0
