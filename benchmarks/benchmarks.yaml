benchmarks:
  - path: circuits/rc_step.yaml
    ngspice_netlist: ngspice/rc_step.cir
    ltspice_netlist: ltspice/rc_step.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, gmres_trbdf2, jfnk_trbdf2]
  - path: circuits/rl_step.yaml
    ngspice_netlist: ngspice/rl_step.cir
    ltspice_netlist: ltspice/rl_step.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, gmres_trbdf2]
  - path: circuits/rlc_step.yaml
    ngspice_netlist: ngspice/rlc_step.cir
    ltspice_netlist: ltspice/rlc_step.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, gmres_trbdf2]
  - path: circuits/rc_dc.yaml
    ngspice_netlist: ngspice/rc_circuit.cir
    ltspice_netlist: ltspice/rc_circuit.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap]
  - path: circuits/diode_rectifier.yaml
    ngspice_netlist: ngspice/diode_rectifier.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/buck_switching.yaml
    ngspice_netlist: ngspice/buck_switching.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/buck_switching.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, trbdf2]
  # buck_igbt — ngspice mapping is intentionally held off pending
  # a Phase-5 IGBT solver fix:
  #   1. Behavioral path (Auto / default): Pulsim's IGBT stamps a hard
  #      voltage-controlled conductance with NO `gm = ∂ic/∂vge` term in
  #      the Jacobian. Newton therefore has no gradient information
  #      around the Vge-vs-Vth threshold, the DC operating point fails
  #      to converge ("All random restarts failed" on a trivial
  #      Vdc + IGBT + Rload circuit — confirmed by direct Python test).
  #   2. Ideal PWL path (`switching_mode: ideal`, `enable_events: true`):
  #      runs but commutation events on Pulsim's freewheel diode +
  #      IGBT pair produce numerical chaos in the first few timesteps
  #      (V(sw) excursions to ±150 V before settling to ~0 V). Both
  #      simulators end at V(out) ≈ 0 V, but max_error blows up to 17 V
  #      in transient.
  # The .cir + YAML are committed (benchmarks/ngspice/buck_igbt.cir,
  # benchmarks/circuits/buck_igbt.yaml) so re-enabling is one
  # ngspice_netlist line addition once either:
  #   (a) IGBT.stamp_jacobian_behavioral adds an explicit gm = sigmoid
  #       gradient through the Vth threshold, or
  #   (b) IGBT.stamp_jacobian_ideal seeds pwl_state from V(gate) at
  #       DC OP time so events aren't required.
  - path: circuits/buck_igbt.yaml
    scenarios: [direct_trap, trbdf2]
  - path: circuits/boost_switching_complex.yaml
    ngspice_netlist: ngspice/boost_switching_complex.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/boost_switching_complex.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, trbdf2]
  - path: circuits/interleaved_buck_3ph.yaml
    ngspice_netlist: ngspice/interleaved_buck_3ph.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/interleaved_buck_3ph.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, trbdf2]
  - path: circuits/buck_mosfet_nonlinear.yaml
    ngspice_netlist: ngspice/buck_mosfet_nonlinear.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/buck_mosfet_nonlinear.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [trbdf2]
  - path: circuits/stiff_rlc.yaml
    ngspice_netlist: ngspice/stiff_rlc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [trbdf2, rosenbrockw]
  # periodic_rc_pwm uses shooting_default / harmonic_balance scenarios
  # that return the periodic steady-state directly; comparing those
  # against an ngspice transient is not meaningful (5 τ_RC ≈ 500 µs
  # exceeds the 200 µs window). Add a long_transient scenario before
  # re-enabling the ngspice mapping.
  - path: circuits/periodic_rc_pwm.yaml
    scenarios: [shooting_default, harmonic_balance]
scenarios:
  direct_trap:
    simulation:
      integrator: trapezoidal
      solver:
        order: [klu]
  gmres_trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [gmres]
        iterative:
          max_iterations: 200
          tolerance: 1e-8
          restart: 40
          preconditioner: ilut
          ilut_drop_tolerance: 1e-3
          ilut_fill_factor: 10
  jfnk_trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [gmres]
        iterative:
          max_iterations: 200
          tolerance: 1e-8
          restart: 40
          preconditioner: ilut
      newton:
        enable_newton_krylov: true
        krylov_residual_cache_tolerance: 1e-8
  trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [klu]
  rosenbrockw:
    simulation:
      integrator: rosenbrockw
      solver:
        order: [klu]
  shooting_default:
    simulation:
      shooting:
        period: 20e-6
        max_iterations: 20
        tolerance: 1e-6
        relaxation: 0.5
        store_last_transient: true
  harmonic_balance:
    simulation:
      harmonic_balance:
        period: 20e-6
        num_samples: 128
        max_iterations: 30
        tolerance: 1e-6
        relaxation: 0.5
        initialize_from_transient: true
simulators:
  ltspice:
    args: [-ascii, -b]
