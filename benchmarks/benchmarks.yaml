  - path: circuits/stiff_rlc.yaml
    ngspice_netlist: ngspice/stiff_rlc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [trbdf2, rosenbrockw]
  # periodic_rc_pwm intentionally NOT in the SPICE parity manifest:
  # it uses shooting_default / harmonic_balance scenarios that return
  # the periodic steady-state directly, which is not comparable to a
  # transient ngspice run. The circuit YAML stays in benchmarks/
  # circuits/ for the (Pulsim-only) periodic-analysis bench, but it
  # has no place here.

  # ----- Component-coverage benchmarks (Phase 7) -----
  - path: circuits/current_source_rc.yaml
    ngspice_netlist: ngspice/current_source_rc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/pulse_voltage_rl.yaml
    ngspice_netlist: ngspice/pulse_voltage_rl.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  # transformer_step_up — held off pending follow-up:
  #   Pulsim's `transformer` is an algebraic ideal transformer
  #   (V_p = N·V_s, I_p = -N·I_s, no magnetizing inductance). ngspice
  #   has no native ideal-transformer primitive; the canonical mirror
  #   uses two coupled inductors (`L1 + L2 + K1`), but with high
  #   inductance values + K → 1 ngspice's MNA goes silently to all-
  #   zeros (numerical conditioning issue with K close to 1), and with
  #   K = 0.99 the magnetizing-current loading drops V(pri_x) below
  #   Pulsim's algebraic ideal by ~5 %. This is a model-paradigm
  #   mismatch, not a Pulsim bug. Re-enable when ngspice gets a
  #   stable coupled-inductor mirror or Pulsim adds a "transformer
  #   with finite Lm" primitive that can be matched.
  - path: circuits/transformer_step_up.yaml
    scenarios: [direct_trap]

  # buck_pmos — held off after Phase-9 investigation:
  #
  #   Phase 8 shipped the smooth-region MOSFET fix
  #   (drain_current_behavioral with sigmoid blend through cutoff /
  #   triode / saturation boundaries). All 273 existing C++ tests
  #   (4021 assertions) still pass — the new model is bit-identical
  #   to the legacy hard-branch code at saturated sigmoid tails. PMOS
  #   DC OP now converges in 6 Newton iterations on a trivial
  #   Vdc + PMOS + Rload bench (V(sw) = 23.94 V matching analytical).
  #
  #   Phase 9 investigated re-enabling buck_pmos. Initial symptom:
  #   "PWM duty > 0.5 doesn't toggle" — V(gate) stays pinned at
  #   v_high for the whole transient. But:
  #
  #   * PWM source IS toggling correctly in isolation at duty=0.64
  #     (verified directly: t=0..8 µs HIGH, t=8..12.5 µs LOW, repeats).
  #   * Same buck circuit with NMOS + duty=0.64 toggles correctly —
  #     the issue is PMOS-specific.
  #   * Pulsim reports 963 timestep rejections over 30 µs — the
  #     adaptive integrator is rolling back almost every step. PMOS
  #     in deep saturation (Vov=21 V → id=44 A in Level-1 Shichman-
  #     Hodges) demands currents the 8 Ω load can't sink, the
  #     residual blows up, the step is rejected, and the rejected
  #     samples carry the stale V(gate) value forward.
  #
  #   Root cause: Shichman-Hodges Level-1 with kp=0.2 + Vov=21 V
  #   produces unphysical saturation currents (44 A) for power
  #   MOSFETs. Real power MOSFETs operate in DEEP TRIODE; Level-1
  #   doesn't model channel-length modulation at low Vds well.
  #   Tuning kp for realistic R_DSon (≪ 50 mΩ) requires kp ≫ 1,
  #   which makes the saturation current even more unphysical.
  #
  #   Phase 10 attempt:
  #     a) Reduced kp 0.2 → 0.02 (mirrored in the .cir) so saturation
  #        current at startup is ~5.5 A (sinkable by the load) instead
  #        of an unphysical 44 A.
  #     b) Set enable_events: true so the integrator lands exactly at
  #        PWM transition breakpoints.
  #
  #   With these changes Pulsim's transient runs cleanly (V(gate)
  #   toggles correctly, integrator no longer rejects ~all timesteps),
  #   but the resulting V(sw) is the wrong polarity (small negative
  #   values instead of climbing toward V(vin) = 24 V). Suggests there
  #   is still a sign-convention bug in the PMOS path's chain rule
  #   (the new manual Jacobian's `di_dvs = -di_internal_dvgs - di_internal_
  #   dvds` is correct for NMOS by inspection, but the PMOS sign-fold
  #   may need a second `sign` factor somewhere). Existing
  #   `test_ad_mosfet_stamp` (which compares manual vs AD-driven stamp)
  #   passes because BOTH paths use the same `drain_current_behavioral`
  #   template — so the cross-validation can't catch a global sign
  #   error in the manual stamp's chain-rule reconstruction.
  #
  #   The Phase-10 retune + enable_events stay in the YAML/.cir as
  #   real improvements (kp=0.2 was overdriving), but the manifest
  #   keeps buck_pmos as skipped pending the PMOS sign audit.
  - path: circuits/buck_pmos.yaml
    scenarios: [direct_trap, trbdf2]
scenarios:
  direct_trap:
    simulation:
      integrator: trapezoidal
      solver:
        order: [klu]
  gmres_trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [gmres]
        iterative:
          max_iterations: 200
          tolerance: 1e-8
          restart: 40
          preconditioner: ilut
          ilut_drop_tolerance: 1e-3
          ilut_fill_factor: 10
  jfnk_trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [gmres]
        iterative:
          max_iterations: 200
          tolerance: 1e-8
          restart: 40
          preconditioner: ilut
      newton:
        enable_newton_krylov: true
        krylov_residual_cache_tolerance: 1e-8
  trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [klu]
  rosenbrockw:
    simulation:
      integrator: rosenbrockw
      solver:
        order: [klu]
  shooting_default:
    simulation:
      shooting:
        period: 20e-6
        max_iterations: 20
        tolerance: 1e-6
        relaxation: 0.5
        store_last_transient: true
  harmonic_balance:
    simulation:
      harmonic_balance:
        period: 20e-6
        num_samples: 128
        max_iterations: 30
        tolerance: 1e-6
        relaxation: 0.5
        initialize_from_transient: true
simulators:
  ltspice:
    args: [-ascii, -b]
