benchmarks:
  - path: circuits/rc_step.yaml
    ngspice_netlist: ngspice/rc_step.cir
    ltspice_netlist: ltspice/rc_step.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, gmres_trbdf2, jfnk_trbdf2]
  - path: circuits/rl_step.yaml
    ngspice_netlist: ngspice/rl_step.cir
    ltspice_netlist: ltspice/rl_step.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, gmres_trbdf2]
  - path: circuits/rlc_step.yaml
    ngspice_netlist: ngspice/rlc_step.cir
    ltspice_netlist: ltspice/rlc_step.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, gmres_trbdf2]
  - path: circuits/rc_dc.yaml
    ngspice_netlist: ngspice/rc_circuit.cir
    ltspice_netlist: ltspice/rc_circuit.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap]
  - path: circuits/diode_rectifier.yaml
    ngspice_netlist: ngspice/diode_rectifier.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/buck_switching.yaml
    ngspice_netlist: ngspice/buck_switching.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/buck_switching.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, trbdf2]
  - path: circuits/buck_igbt.yaml
    ngspice_netlist: ngspice/buck_igbt.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap, trbdf2]
  - path: circuits/boost_switching_complex.yaml
    ngspice_netlist: ngspice/boost_switching_complex.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/boost_switching_complex.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, trbdf2]
  - path: circuits/interleaved_buck_3ph.yaml
    ngspice_netlist: ngspice/interleaved_buck_3ph.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/interleaved_buck_3ph.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [direct_trap, trbdf2]
  - path: circuits/buck_mosfet_nonlinear.yaml
    ngspice_netlist: ngspice/buck_mosfet_nonlinear.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    ltspice_netlist: ltspice/buck_mosfet_nonlinear.cir
    ltspice_observables:
      - column: V(out)
        ltspice_vector: V(out)
    scenarios: [trbdf2]
  - path: circuits/stiff_rlc.yaml
    ngspice_netlist: ngspice/stiff_rlc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [trbdf2, rosenbrockw]
  # periodic_rc_pwm intentionally NOT in the SPICE parity manifest:
  # it uses shooting_default / harmonic_balance scenarios that return
  # the periodic steady-state directly, which is not comparable to a
  # transient ngspice run. The circuit YAML stays in benchmarks/
  # circuits/ for the (Pulsim-only) periodic-analysis bench, but it
  # has no place here.

  # ----- Component-coverage benchmarks (Phase 7) -----
  - path: circuits/current_source_rc.yaml
    ngspice_netlist: ngspice/current_source_rc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/pulse_voltage_rl.yaml
    ngspice_netlist: ngspice/pulse_voltage_rl.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  # transformer_step_up — held off pending follow-up:
  #   Pulsim's `transformer` is an algebraic ideal transformer
  #   (V_p = N·V_s, I_p = -N·I_s, no magnetizing inductance). ngspice
  #   has no native ideal-transformer primitive; the canonical mirror
  #   uses two coupled inductors (`L1 + L2 + K1`), but with high
  #   inductance values + K → 1 ngspice's MNA goes silently to all-
  #   zeros (numerical conditioning issue with K close to 1), and with
  #   K = 0.99 the magnetizing-current loading drops V(pri_x) below
  #   Pulsim's algebraic ideal by ~5 %. This is a model-paradigm
  #   mismatch, not a Pulsim bug. Re-enable when ngspice gets a
  #   stable coupled-inductor mirror or Pulsim adds a "transformer
  #   with finite Lm" primitive that can be matched.
  - path: circuits/transformer_step_up.yaml
    scenarios: [direct_trap]

  # ----- Phase 14 component-coverage additions -----
  # Each new entry validates one Pulsim primitive end-to-end against
  # ngspice. The goal: a runnable matrix that proves every supported
  # component in the parser still produces SPICE-equivalent behavior.
  - path: circuits/sine_voltage_rc.yaml
    ngspice_netlist: ngspice/sine_voltage_rc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/pwm_voltage_rc.yaml
    ngspice_netlist: ngspice/pwm_voltage_rc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/snubber_rc.yaml
    ngspice_netlist: ngspice/snubber_rc.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/vcswitch_resistor.yaml
    ngspice_netlist: ngspice/vcswitch_resistor.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/mosfet_nmos_dc.yaml
    ngspice_netlist: ngspice/mosfet_nmos_dc.cir
    ngspice_observables:
      - column: V(drain)
        spice_vector: v(drain)
    scenarios: [direct_trap]
  - path: circuits/coupled_inductor_step.yaml
    ngspice_netlist: ngspice/coupled_inductor_step.cir
    ngspice_observables:
      - column: V(sec)
        spice_vector: v(sec)
    scenarios: [direct_trap]
  - path: circuits/transformer_leakage.yaml
    ngspice_netlist: ngspice/transformer_leakage.cir
    ngspice_observables:
      - column: V(sec)
        spice_vector: v(sec)
    scenarios: [direct_trap]

  # ----- Phase 17: inverter / topology stress tests -----
  # Progressively heavier topologies designed to find solver +
  # component-coverage gaps. Each pushes a different stress axis.
  - path: circuits/synchronous_buck.yaml
    ngspice_netlist: ngspice/synchronous_buck.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/half_bridge_inverter.yaml
    ngspice_netlist: ngspice/half_bridge_inverter.cir
    ngspice_observables:
      - column: V(load)
        spice_vector: v(load)
    scenarios: [direct_trap]
  # full_bridge_dc deferred: bidirectional inductor current
  # reversal at the diagonal-pair flip drives unbounded V(load_p)
  # excursions when the body diodes can't recover the current fast
  # enough. Real H-bridge inverters need a controlled commutation
  # delay (dead time) AND a quiescent load (cap or back-EMF) to
  # damp the polarity flip; a pure RL load with hard switching is
  # numerically pathological.
  # - path: circuits/full_bridge_dc.yaml
  # flyback_converter: coupled_inductor + vcswitch + diode cascade
  # on a transformer-isolated SMPS. With the original
  # `trapezoidal + adaptive_timestep + switching_mode:ideal`
  # config the mutual-coupling stamp interacted with the switch
  # PWL state badly enough that Newton couldn't make it past the
  # first PWM transition. Switched to the buck_switching robust
  # template (bdf1 + dt=0.1 µs + Newton max_iter=240 + gmin
  # stepping) and the same circuit now passes with max_err ≈
  # 0.38 V on V(out). No C++ change was needed — the mutual
  # stamp + diode commutation simply needs the same
  # rejection-tolerant config the other switching benches use.
  - path: circuits/flyback_converter.yaml
    ngspice_netlist: ngspice/flyback_converter.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    # flyback needs the bdf1+robust-Newton config from the YAML;
    # direct_trap forces trapezoidal which breaks at the first PWM
    # transition. The trbdf2 scenario keeps the YAML's bdf1 (or
    # falls back to TRBDF2) and the manifest run passes.
    scenarios: [trbdf2]
  - path: circuits/boost_classic.yaml
    ngspice_netlist: ngspice/boost_classic.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/buck_boost.yaml
    ngspice_netlist: ngspice/buck_boost.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]

  # cascaded_boost_buck deferred: the boost stage's inductor current
  # never builds (Pulsim's solver freezes IL=0 while the diode-cap
  # network alternates between high-Z and conducting at every step).
  # This is a chatter pathology specific to the
  # vcswitch+inductor+diode+cap-bus combo on the SAME node — the
  # plain boost_classic and the buck_boost (single-switch) both
  # pass, but stacking a second buck on the diode-clamped boost-bus
  # node tips Newton into rejection-only territory. Tracked as
  # follow-up; the two-stage step-down (cascaded_buck_buck) below
  # exercises stage interaction without this pathology.
  # - path: circuits/cascaded_boost_buck.yaml
  - path: circuits/cascaded_buck_buck.yaml
    ngspice_netlist: ngspice/cascaded_buck_buck.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/sync_buck_500khz.yaml
    ngspice_netlist: ngspice/sync_buck_500khz.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/triple_sync_buck.yaml
    ngspice_netlist: ngspice/triple_sync_buck.cir
    ngspice_observables:
      - column: V(out_b)
        spice_vector: v(out_b)
    scenarios: [direct_trap]
  - path: circuits/buck_dcm.yaml
    ngspice_netlist: ngspice/buck_dcm.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]

  # ----- Phase 18: heavier topology stress tests -----
  # 10 new converter / inverter topologies covering most of the
  # PE textbook taxonomy.  3 deferred (sync_boost, half_bridge_
  # transformer_dc, npc_three_level_halfbridge) — see DEFERRED
  # comments below.
  - path: circuits/diode_bridge_rectifier.yaml
    ngspice_netlist: ngspice/diode_bridge_rectifier.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/sepic.yaml
    ngspice_netlist: ngspice/sepic.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/cuk_converter.yaml
    ngspice_netlist: ngspice/cuk_converter.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/voltage_doubler.yaml
    ngspice_netlist: ngspice/voltage_doubler.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/two_phase_interleaved_boost.yaml
    ngspice_netlist: ngspice/two_phase_interleaved_boost.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/synchronous_flyback.yaml
    ngspice_netlist: ngspice/synchronous_flyback.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [trbdf2]
  - path: circuits/bidirectional_buck_boost.yaml
    ngspice_netlist: ngspice/bidirectional_buck_boost.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]
  - path: circuits/three_phase_diode_rectifier.yaml
    ngspice_netlist: ngspice/three_phase_diode_rectifier.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    # YAML uses bdf1 + robust Newton config; need direct_bdf1
    # scenario so the manifest doesn't override to trapezoidal/
    # trbdf2 (both of which lose accuracy on this circuit).
    scenarios: [direct_bdf1]
  - path: circuits/forward_converter.yaml
    ngspice_netlist: ngspice/forward_converter.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [trbdf2]
  - path: circuits/buck_with_current_sense.yaml
    ngspice_netlist: ngspice/buck_with_current_sense.cir
    ngspice_observables:
      - column: V(out)
        spice_vector: v(out)
    scenarios: [direct_trap]

  # ----- Phase 19: closed-loop / control-block coverage -----
  # Each circuit exercises one or more virtual control blocks
  # wired into a small power stage. ngspice has no equivalent
  # for these blocks, so they validate against captured Pulsim
  # baselines (regression-only — output verified-by-hand once).
  - path: circuits/cl_buck_pi.yaml
    scenarios: [default]
  - path: circuits/cl_buck_pid.yaml
    scenarios: [default]
  - path: circuits/cl_buck_hysteresis.yaml
    scenarios: [default]
  - path: circuits/cl_buck_lookup_duty.yaml
    scenarios: [default]
  - path: circuits/cl_buck_rate_limited_ref.yaml
    scenarios: [default]
  - path: circuits/cl_buck_aggressive_pi.yaml
    scenarios: [default]
  - path: circuits/cl_buck_sample_hold.yaml
    scenarios: [default]
  - path: circuits/cl_buck_pi_with_gain.yaml
    scenarios: [default]
  - path: circuits/cl_buck_integrator.yaml
    scenarios: [default]
  - path: circuits/cl_buck_limiter_chain.yaml
    scenarios: [default]
  # cl_boost_pi un-deferred in Phase 21 after the diode-commutation
  # heuristic landed (force_inductor_driven_diode_commutations).  The
  # V(sw) ±10 kV chatter that previously killed this bench is gone;
  # the boost now runs deterministically and the regression dashboard
  # tracks it.  Steady-state regulation is still mediocre (~1 V on a
  # 10 V target) because the open-loop boost is intrinsically slow to
  # come up with these gains — the test verifies stability, not the
  # exact operating point.
  - path: circuits/cl_boost_pi.yaml
    scenarios: [default]

  # ----- Phase 20: sine input/output + multilevel converters -----
  # No ngspice equivalents wired up here either — these validate
  # against captured Pulsim baselines, like the Phase 19 closed-
  # loop benches.  Each one exercises a different mix of:
  # sine-source AC behavior, multi-cell switching topologies,
  # transformer-isolated paths, and high-Q resonant tanks.
  - path: circuits/rlc_series_resonant.yaml
    scenarios: [default]
  - path: circuits/lc_low_pass_sine.yaml
    scenarios: [default]
  - path: circuits/half_wave_rectifier_sine.yaml
    scenarios: [default]
  - path: circuits/half_bridge_lc_filter.yaml
    scenarios: [default]
  - path: circuits/flying_capacitor_3level.yaml
    scenarios: [default]
  - path: circuits/cascaded_h_bridge_5level.yaml
    scenarios: [default]
  - path: circuits/t_type_3level_halfbridge.yaml
    scenarios: [default]
  - path: circuits/lcc_resonant_inverter.yaml
    scenarios: [default]
  - path: circuits/active_clamp_forward.yaml
    scenarios: [default]
  - path: circuits/boost_pfc_open_loop.yaml
    scenarios: [default]
  - path: circuits/dual_active_bridge.yaml
    scenarios: [default]
  - path: circuits/half_bridge_inverter_lc.yaml
    scenarios: [default]

  # synchronous_boost DEFERRED: sync rectifier instead of a
  #   freewheel diode means the inductor can reverse-conduct
  #   during the OFF half-cycle, which excites the LC tank into
  #   sustained oscillation.  Real sync-boost controllers use
  #   zero-current detection to gate the sync switch off when
  #   iL → 0; with a fixed PWM both Pulsim and ngspice diverge
  #   into multi-mode resonance (verified end-to-end).
  # half_bridge_transformer_dc DEFERRED: the half-bridge mid-rail
  #   topology with phase-shifted PWMs and a 4-node coupled_inductor
  #   leaves V(g_l) stuck in BDF1 mode and triggers max-iterations
  #   in trapezoidal — needs proper dead-time + complementary gating
  #   that the simple PWM source can't express robustly.
  # npc_three_level_halfbridge DEFERRED: 4 series vcswitches + 2
  #   clamp diodes + LC filter is numerically pathological without
  #   body diodes on each switch and active mid-rail balancing;
  #   both Pulsim and ngspice diverge into multi-kilovolt swings
  #   at the first transition.

  # buck_pmos — Phase 14 re-test: Pulsim's PMOS now DC-OP-converges
  #   and the transient settles to ~12 V at t = 500 µs (with the
  #   MOSFET runtime-stamp sign fix). However, the **ngspice
  #   reference** itself fails to converge on this circuit:
  #     ngspice doAnalyses: TRAN: Timestep too small; trouble with
  #     node "sw"
  #   ngspice aborts after 7 data rows, so there's nothing to compare
  #   against. This is a SPICE-side numerical issue with the Level-1
  #   PMOS model + 64 % duty cycle, not a Pulsim correctness gap.
  #   Kept here as a future "needs ngspice .cir tuning" item.
  - path: circuits/buck_pmos.yaml
    scenarios: [direct_trap, trbdf2]
scenarios:
  direct_trap:
    simulation:
      integrator: trapezoidal
      solver:
        order: [klu]
  gmres_trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [gmres]
        iterative:
          max_iterations: 200
          tolerance: 1e-8
          restart: 40
          preconditioner: ilut
          ilut_drop_tolerance: 1e-3
          ilut_fill_factor: 10
  jfnk_trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [gmres]
        iterative:
          max_iterations: 200
          tolerance: 1e-8
          restart: 40
          preconditioner: ilut
      newton:
        enable_newton_krylov: true
        krylov_residual_cache_tolerance: 1e-8
  trbdf2:
    simulation:
      integrator: trbdf2
      solver:
        order: [klu]
  direct_bdf1:
    simulation:
      integrator: bdf1
      solver:
        order: [klu]
  rosenbrockw:
    simulation:
      integrator: rosenbrockw
      solver:
        order: [klu]
  shooting_default:
    simulation:
      shooting:
        period: 20e-6
        max_iterations: 20
        tolerance: 1e-6
        relaxation: 0.5
        store_last_transient: true
  harmonic_balance:
    simulation:
      harmonic_balance:
        period: 20e-6
        num_samples: 128
        max_iterations: 30
        tolerance: 1e-6
        relaxation: 0.5
        initialize_from_transient: true
simulators:
  ltspice:
    args: [-ascii, -b]
