schema: pulsim-advanced-solver-decision-v1
version: 1
description: Heavy stress benchmark contract for advanced backend trend evaluation.

candidates:
  - id: sundials_ida_direct
    backend: sundials
    solver_family: ida
    formulation: direct
    maturity: production_candidate
    enabled_by_default: false
  - id: sundials_cvode
    backend: sundials
    solver_family: cvode
    formulation: direct
    maturity: experimental
    enabled_by_default: false
  - id: sundials_arkode
    backend: sundials
    solver_family: arkode
    formulation: direct
    maturity: experimental
    enabled_by_default: false
  - id: sundials_kinsol
    backend: sundials
    solver_family: kinsol
    formulation: nonlinear_only
    maturity: experimental
    enabled_by_default: false
  - id: petsc_snes_ksp
    backend: petsc
    solver_family: snes
    formulation: direct
    maturity: experimental
    enabled_by_default: false

benchmark_set:
  - benchmark_id: diode_rectifier
    scenarios: [direct_trap_heavy]
    class: diode_heavy
  - benchmark_id: boost_switching_complex
    scenarios: [direct_trap_heavy_switch, trbdf2_heavy_switch]
    class: switch_heavy
  - benchmark_id: interleaved_buck_3ph
    scenarios: [direct_trap_heavy_switch, trbdf2_heavy_switch]
    class: switch_heavy
  - benchmark_id: buck_mosfet_nonlinear
    scenarios: [trbdf2_heavy_switch]
    class: switch_heavy
  - benchmark_id: stiff_rlc
    scenarios: [trbdf2_heavy_stiff, rosenbrockw_heavy_stiff]
    class: switch_heavy
  - benchmark_id: periodic_rc_pwm
    scenarios: [shooting_heavy, harmonic_balance_heavy]
    class: closed_loop_control
  - benchmark_id: magnetic_core_saturation
    scenarios: [direct_trap_heavy_magnetic]
    class: magnetic_nonlinear
  - benchmark_id: magnetic_core_hysteresis
    scenarios: [direct_trap_heavy_magnetic]
    class: magnetic_nonlinear

decision_criteria:
  min_success_rate_gain_abs: 0.02
  max_runtime_regression_rel: 0.15
  max_memory_regression_rel: 0.20
  min_portability_score: 0.70
  max_maintenance_cost_score: 6.0

scoring_weights:
  robustness: 0.45
  runtime: 0.25
  portability: 0.20
  maintenance: 0.10

selection_policy:
  require_all_hard_constraints: true
  tie_breaker_order:
    - robustness_gain
    - runtime_regression
    - portability_score
    - maintenance_cost
